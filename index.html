<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関心コネクター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f7f6f3; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 540px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .api-screen { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; padding: 24px 20px; margin-top: 40px; }
  .api-screen h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .api-screen p { font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 16px; }
  .scene-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: border-color .15s; }
  .scene-card:hover { border-color: #ccc; }
  .scene-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .scene-card p { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .scene-card span { font-size: 12px; color: #888; }
  .card { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=password], textarea { width: 100%; padding: 10px 12px; border: 1px solid #e0deda; border-radius: 8px; font-size: 14px; font-family: inherit; background: #faf9f7; color: #1a1a1a; outline: none; transition: border-color .15s; }
  input[type=text]:focus, input[type=password]:focus, textarea:focus { border-color: #aaa; background: #fff; }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .mode-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-btn { flex: 1; padding: 10px; border: 1px solid #e0deda; border-radius: 8px; background: #faf9f7; font-size: 14px; cursor: pointer; transition: all .15s; color: #666; }
  .btn-primary { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; margin-top: 4px; color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .back-btn { background: none; border: none; font-size: 13px; color: #888; cursor: pointer; padding: 0; margin-bottom: 20px; }
  .topic-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .topic-card:hover { border-color: #aaa; }
  .topic-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .topic-card p { font-size: 13px; color: #666; line-height: 1.5; }
  .msg-bubble { background: #f3f2ef; border-radius: 12px 12px 12px 3px; padding: 12px 15px; font-size: 14px; line-height: 1.7; margin-bottom: 8px; cursor: pointer; transition: background .15s; }
  .msg-bubble:hover { background: #eae9e5; }
  .msg-bubble.copied { background: #e8f5e9; }
  .coach-box { border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .score-box { background: #f7f6f3; border-radius: 10px; padding: 12px; text-align: center; }
  .score-box .slabel { font-size: 11px; color: #888; margin-bottom: 4px; }
  .score-box .val { font-size: 22px; font-weight: 700; }
  .bar-bg { background: #e8e6e0; border-radius: 4px; height: 6px; margin-top: 6px; overflow: hidden; }
  .bar-fill { height: 6px; border-radius: 4px; transition: width .5s ease; }
  .fb-section { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .fb-section h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .fb-item { font-size: 14px; line-height: 1.6; margin-bottom: 8px; padding-left: 12px; border-left: 2px solid; border-radius: 0; }
  .status { font-size: 12px; color: #888; text-align: center; margin-top: 8px; min-height: 18px; }
  .step { display: none; }
  .step.active { display: block; }
  .copy-hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">

  <div id="step-apikey" class="step active">
    <h1>関心コネクター</h1>
    <p class="subtitle">相手の関心に寄り添う話題・メッセージを提案します</p>
    <div class="api-screen">
      <h2>はじめに</h2>
      <p>このツールを使うにはOpenAI APIキーが必要です。入力したキーはあなたのブラウザにのみ保存され、外部には送信されません。</p>
      <label>OpenAI APIキー</label>
      <input type="password" id="api-key-input" placeholder="sk-..." />
      <p style="font-size:12px;color:#aaa;margin-top:8px;">platform.openai.com で取得できます。キーはブラウザのローカルストレージに保存されます。</p>
      <button class="btn-primary" onclick="saveApiKey()" style="background:#1a1a1a;margin-top:16px;">はじめる</button>
      <p class="status" id="key-status"></p>
    </div>
  </div>

  <div id="step-scene" class="step">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <h1>関心コネクター</h1>
      <button onclick="showStep('apikey')" style="background:none;border:none;font-size:12px;color:#aaa;cursor:pointer;">キーを変更</button>
    </div>
    <p class="subtitle">誰との会話をサポートしますか？</p>
    <div id="scene-list"></div>
  </div>

  <div id="step-input" class="step">
    <button class="back-btn" onclick="showStep('scene')">← 戻る</button>
    <div class="mode-row">
      <button class="mode-btn active" id="mode-topics" onclick="setMode('topics')">話題を提案</button>
      <button class="mode-btn" id="mode-analyze" onclick="setMode('analyze')">メッセージを分析</button>
    </div>
    <div class="card">
      <div id="input-form"></div>
      <div id="analyze-block" style="display:none;">
        <label>送ろうとしているメッセージ</label>
        <textarea id="f-message" placeholder="ここに入力してください"></textarea>
      </div>
    </div>
    <button class="btn-primary" id="gen-btn" onclick="runAction()">話題を提案してもらう</button>
    <p class="status" id="gen-status"></p>
  </div>

  <div id="step-topics" class="step">
    <button class="back-btn" onclick="showStep('input')">← 入力に戻る</button>
    <p style="font-size:13px;color:#888;margin-bottom:12px;">気になる話題を選んでください</p>
    <div id="topics-list"></div>
    <button class="btn-primary" id="regen-btn" onclick="runAction()" style="margin-top:8px;">話題を更新する</button>
  </div>

  <div id="step-messages" class="step">
    <button class="back-btn" onclick="showStep('topics')">← 話題に戻る</button>
    <div id="msg-header" style="margin-bottom:14px;"></div>
    <p class="copy-hint">タップしてコピー</p>
    <div id="messages-list"></div>
  </div>

  <div id="step-analysis" class="step">
    <button class="back-btn" onclick="showStep('input')">← 書き直す</button>
    <div id="analysis-content"></div>
  </div>

</div>
<script>
let currentScene='',currentMode='topics',topicsData=[];
const palette={matching:{accent:'#c94f76',light:'#fdf0f5',dark:'#7a1f40'},child:{accent:'#1a9e72',light:'#edf8f3',dark:'#0a4f38'},friend:{accent:'#2563b8',light:'#eef4fd',dark:'#0f3470'},work:{accent:'#b06b10',light:'#fdf3e6',dark:'#5c3205'}};
const scenes=[{id:'matching',icon:'♥',bg:'#fdf0f5',label:'マッチングアプリの相手',desc:'プロフィールから話題・メッセージを提案'},{id:'child',icon:'★',bg:'#edf8f3',label:'子供との会話',desc:'子供の関心に寄り添う声かけを提案'},{id:'friend',icon:'◎',bg:'#eef4fd',label:'友人・知人',desc:'久しぶりの会話や関係を深めたいとき'},{id:'work',icon:'▲',bg:'#fdf3e6',label:'職場の上司・部下',desc:'1on1や雑談のきっかけを提案'}];
const forms={matching:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><label>名前</label><input type="text" id="f-name" placeholder="例：さくらさん"></div><div><label>年齢・職業</label><input type="text" id="f-sub" placeholder="例：30代・デザイナー"></div></div><label>好きなこと・趣味</label><input type="text" id="f-hobbies" placeholder="例：旅行、カフェ、映画"><label>プロフィール文</label><textarea id="f-bio" placeholder="自己紹介文を貼り付けてください"></textarea><label>最近の会話メモ（任意）</label><textarea id="f-context" style="min-height:60px;" placeholder="例：旅行の話で盛り上がった"></textarea>`,child:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><label>名前</label><input type="text" id="f-name" placeholder="例：たろう"></div><div><label>年齢・学年</label><input type="text" id="f-sub" placeholder="例：8歳・小2"></div></div><label>最近夢中なこと</label><input type="text" id="f-hobbies" placeholder="例：マインクラフト、昆虫"><label>性格・特徴</label><textarea id="f-bio" placeholder="例：人見知り、感受性が強い"></textarea><label>最近気になること（任意）</label><textarea id="f-context" style="min-height:60px;" placeholder="例：最近口数が減った"></textarea>`,friend:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><label>名前</label><input type="text" id="f-name" placeholder="例：田中さん"></div><div><label>関係・頻度</label><input type="text" id="f-sub" placeholder="例：大学の友人・半年ぶり"></div></div><label>好きなこと・趣味</label><input type="text" id="f-hobbies" placeholder="例：登山、読書"><label>覚えていること</label><textarea id="f-bio" placeholder="例：最近転職した、結婚した"></textarea><label>最近の会話メモ（任意）</label><textarea id="f-context" style="min-height:60px;" placeholder="例：仕事の悩みを話していた"></textarea>`,work:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><label>名前</label><input type="text" id="f-name" placeholder="例：佐藤部長"></div><div><label>関係・役職</label><input type="text" id="f-sub" placeholder="例：直属の上司"></div></div><label>趣味・仕事以外の話題</label><input type="text" id="f-hobbies" placeholder="例：ゴルフ、子育て"><label>性格・最近の様子</label><textarea id="f-bio" placeholder="例：最近忙しそう、細かい性格"></textarea><label>会話のシーン（任意）</label><textarea id="f-context" style="min-height:60px;" placeholder="例：明日の1on1"></textarea>`};

function saveApiKey(){const k=document.getElementById('api-key-input').value.trim();if(!k.startsWith('sk-')){document.getElementById('key-status').textContent='APIキーはsk-から始まる文字列です';return;}localStorage.setItem('oai_key',k);renderScenes();showStep('scene');}
function getKey(){return localStorage.getItem('oai_key')||'';}
function renderScenes(){document.getElementById('scene-list').innerHTML=scenes.map(s=>`<div class="scene-card" onclick="selectScene('${s.id}')"><div class="scene-icon" style="background:${s.bg};">${s.icon}</div><div><p>${s.label}</p><span>${s.desc}</span></div></div>`).join('');}
window.onload=()=>{renderScenes();if(getKey())showStep('scene');};

function selectScene(s){currentScene=s;document.getElementById('input-form').innerHTML=forms[s];document.getElementById('gen-btn').style.background=palette[s].accent;applyMode();showStep('input');}
function setMode(m){currentMode=m;applyMode();}
function applyMode(){const c=palette[currentScene]||palette.matching;document.getElementById('analyze-block').style.display=currentMode==='analyze'?'block':'none';document.getElementById('gen-btn').textContent=currentMode==='topics'?'話題を提案してもらう':'メッセージを分析する';['topics','analyze'].forEach(m=>{const b=document.getElementById('mode-'+m);if(m===currentMode){b.style.borderColor=c.accent;b.style.color=c.accent;b.style.background=c.light;}else{b.style.borderColor='#e0deda';b.style.color='#666';b.style.background='#faf9f7';}});}
function showStep(n){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('step-'+n).classList.add('active');window.scrollTo(0,0);}
function getData(){return{name:document.getElementById('f-name')?.value||'',sub:document.getElementById('f-sub')?.value||'',hobbies:document.getElementById('f-hobbies')?.value||'',bio:document.getElementById('f-bio')?.value||'',context:document.getElementById('f-context')?.value||''};}

function buildPrompt(d,mode,msg){
  const base={matching:`マッチングアプリの相手の関心事に寄り添う会話の話題を提案してください。\n名前:${d.name} 職業:${d.sub} 趣味:${d.hobbies}\n自己紹介:${d.bio}\n会話メモ:${d.context}`,child:`子供の関心事に親が寄り添える話題を提案してください。子供が自然に話したくなる声かけを作ってください。\n名前:${d.name} 年齢:${d.sub} 夢中なこと:${d.hobbies}\n性格:${d.bio} 気になること:${d.context}`,friend:`友人との会話を深める話題を提案してください。\n名前:${d.name} 関係:${d.sub} 趣味:${d.hobbies}\n覚えていること:${d.bio} 会話メモ:${d.context}`,work:`職場の人間関係を良くする雑談の話題を提案してください。\n名前:${d.name} 関係:${d.sub} 趣味:${d.hobbies}\n性格:${d.bio} シーン:${d.context}`}[currentScene];
  if(mode==='analyze')return base+`\n\n送ろうとしているメッセージ:${msg}\n\n以下のJSON形式のみで回答:\n{"cheer":"応援コメント40字以内","good":["良い点1","良い点2"],"hints":["ヒント1","ヒント2"],"score_interest":整数0~100,"score_question":整数0~100,"proposals":[{"label":"ラベル","text":"改善メッセージ"},{"label":"","text":""},{"label":"","text":""}]}`;
  return base+`\n\n以下のJSON形式のみで回答:\n{"topics":[{"title":"タイトル10字以内","why":"理由35字以内","messages":["例1","例2","例3"]},...]5個}`;
}

async function runAction(){
  const d=getData();const msg=document.getElementById('f-message')?.value||'';
  if(currentMode==='analyze'&&!msg.trim()){document.getElementById('gen-status').textContent='メッセージを入力してください';return;}
  document.getElementById('gen-btn').disabled=true;const rb=document.getElementById('regen-btn');if(rb)rb.disabled=true;
  document.getElementById('gen-status').textContent='考えています...';
  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${getKey()}`},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:1500,messages:[{role:'user',content:buildPrompt(d,currentMode,msg)}]})});
    const data=await res.json();
    const parsed=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim());
    if(currentMode==='analyze'){renderAnalysis(parsed);showStep('analysis');}else{topicsData=parsed.topics;renderTopics();showStep('topics');}
  }catch(e){document.getElementById('gen-status').textContent='生成に失敗しました。APIキーを確認してください。';}
  finally{document.getElementById('gen-btn').disabled=false;if(rb)rb.disabled=false;document.getElementById('gen-status').textContent='';}
}

function renderTopics(){const c=palette[currentScene];const rb=document.getElementById('regen-btn');if(rb){rb.style.background=c.accent;}document.getElementById('topics-list').innerHTML=topicsData.map((t,i)=>`<div class="topic-card" onclick="selectTopic(${i})"><div><h3>${t.title}</h3><p>${t.why}</p></div><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:2px;"><path d="M6 12l4-4-4-4" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`).join('');}
function selectTopic(i){const t=topicsData[i];const c=palette[currentScene];document.getElementById('msg-header').innerHTML=`<div style="background:${c.light};border-radius:10px;padding:13px 15px;"><p style="font-size:15px;font-weight:600;color:${c.dark};margin-bottom:3px;">${t.title}</p><p style="font-size:13px;color:${c.accent};">${t.why}</p></div>`;document.getElementById('messages-list').innerHTML=t.messages.map(msg=>`<div class="msg-bubble" onclick="copyBubble('${msg.replace(/'/g,"\\'")}',this)">${msg}</div>`).join('');showStep('messages');}
function renderAnalysis(d){const c=palette[currentScene];document.getElementById('analysis-content').innerHTML=`<div class="coach-box" style="background:${c.light};"><p style="font-size:12px;font-weight:600;color:${c.accent};margin-bottom:5px;">コーチより</p><p style="font-size:15px;line-height:1.7;">${d.cheer}</p></div><div class="score-row"><div class="score-box"><div class="slabel">相手への関心度</div><div class="val" style="color:${c.accent};">${d.score_interest}</div><div class="bar-bg"><div class="bar-fill" style="width:${d.score_interest}%;background:${c.accent};"></div></div></div><div class="score-box"><div class="slabel">会話を広げる力</div><div class="val" style="color:${c.accent};">${d.score_question}</div><div class="bar-bg"><div class="bar-fill" style="width:${d.score_question}%;background:${c.accent};"></div></div></div></div><div class="fb-section"><h4 style="color:#1a9e72;">すでに素敵なところ</h4>${d.good.map(p=>`<div class="fb-item" style="border-color:#1a9e72;">${p}</div>`).join('')}</div><div class="fb-section"><h4 style="color:#b06b10;">こうするともっと素敵かも</h4>${d.hints.map(p=>`<div class="fb-item" style="border-color:#f0c060;">${p}</div>`).join('')}</div><p class="copy-hint" style="margin-top:16px;">改善メッセージ例（タップしてコピー）</p>${d.proposals.map(p=>`<div class="msg-bubble" onclick="copyBubble('${p.text.replace(/'/g,"\\'")}',this)"><p style="font-size:11px;color:${c.accent};font-weight:600;margin-bottom:3px;">${p.label}</p><p style="font-size:14px;line-height:1.7;">${p.text}</p></div>`).join('')}`;}
function copyBubble(text,el){navigator.clipboard.writeText(text).catch(()=>{});el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),800);}
</script>
</body>
</html>
